<!doctype html>
<html lang="zh-Hant" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="robots" content="noindex, nofollow" />
    <link rel="icon" href="%BASE_URL%favicon.png" sizes="any" />
    <link rel="icon" href="%BASE_URL%icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="%BASE_URL%favicon.png" />
    <title>TRMission 維運後台</title>
    <script>
      // Resolve the saved theme before first paint. Dark is the dashboard's default;
      // its own storage key so it never fights the game's theme choice.
      (function () {
        try {
          var t = localStorage.getItem('trm.admin.theme') || 'dark';
          document.documentElement.setAttribute('data-theme', t === 'light' ? 'light' : 'dark');
        } catch (e) {
          /* storage unavailable — the dark default in the html attribute stands */
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
