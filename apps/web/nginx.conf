# Link-preview crawlers (Discord/Slack/Telegram/X/Facebook/…) can't run the SPA, so the
# share targets route them to the server's OG renderer (per-link meta + card image) instead
# of the static shell. Humans never match — they keep getting index.html.
map $http_user_agent $og_bot {
  default 0;
  ~*(facebookexternalhit|facebot|twitterbot|slackbot|discordbot|telegrambot|whatsapp|linkedinbot|pinterestbot|redditbot|skypeuripreview|embedly|iframely|line/|kakaotalk) 1;
}

server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # ── Compression + response hardening ────────────────────────────────────────
  # helmet only guards the NestJS API responses; the static SPA shell + its JS/CSS
  # assets are served straight from here, so nginx is where their security headers and
  # compression have to live (a website-audit scan of `/` — the static shell — is what
  # flagged their absence). `always` keeps the headers on error/redirect responses too.
  # They also ride on the proxied /api + /ws responses below: X-Frame-Options and
  # X-Content-Type-Options are byte-identical to helmet's own defaults (a benign duplicate),
  # and main.ts aligns helmet's Referrer-Policy to this same value — so nothing conflicts.
  gzip on;
  gzip_vary on;
  gzip_comp_level 6;
  gzip_min_length 1024;
  gzip_proxied any;
  gzip_types text/plain text/css application/javascript application/json
             application/xml application/xml+rss application/manifest+json
             image/svg+xml application/wasm;

  add_header X-Content-Type-Options nosniff always;
  add_header X-Frame-Options SAMEORIGIN always;
  add_header Referrer-Policy strict-origin-when-cross-origin always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
  # A deliberately minimal Content-Security-Policy: it sets NO default-src/script-src, so it
  # cannot break the Cloudflare-Zaraz-injected analytics, Google Identity Services, or the
  # AdSense scripts/frames the app relies on — it only closes the clickjacking (frame-ancestors),
  # plugin (object-src), and <base>-injection (base-uri) vectors. A full script-src/connect-src
  # policy is a follow-up that needs live verification against those third parties (best driven
  # through Zaraz's own CSP/nonce support, since Zaraz injects scripts at the edge).
  add_header Content-Security-Policy "frame-ancestors 'self'; object-src 'none'; base-uri 'self'" always;

  # REST control plane → server.
  location /api/ {
    proxy_pass http://server:3001;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # WebSocket gameplay → server (upgrade).
  location /ws {
    proxy_pass http://server:3001;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_read_timeout 1h;
  }

  # Deep-link verification files → server. Apple's AASA CDN and Google's App Links verifier
  # fetch these from the web origin; the JSON is rendered by the API's WellKnownController from
  # its APPLE_APP_ID / ANDROID_PACKAGE_NAME / ANDROID_CERT_SHA256 env. Without this block they
  # fall through to the SPA fallback and verification reads index.html — which permanently
  # breaks Universal/App Links (shared /room/* URLs then always open in the browser, never the
  # app). `^~` so no regex location can steal the path; unconfigured deployments proxy the
  # server's 404 (correct: "no mobile app here"), never an HTML 200.
  location ^~ /.well-known/ {
    proxy_pass http://server:3001;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Maintainer dashboard SPA under /admin/ (assets built with base=/admin/). `^~` wins
  # over the OG regex locations below so admin paths never hit the crawler rewrites.
  # The trailing slash is load-bearing: a bare `location /admin` prefix would also swallow
  # sibling web-SPA routes like /admin-replay/:id (the ticketed maintainer replay lives in
  # apps/web, not this dashboard) and serve them the admin shell. Matching `/admin/` scopes
  # this to the dashboard subtree; bare `/admin` is redirected into it.
  location = /admin {
    return 301 /admin/;
  }
  location ^~ /admin/ {
    try_files $uri $uri/ /admin/index.html;
  }

  # Vanity invite link — client code and the header/welcome-screen buttons always point at our
  # own domain, so the invite itself can rotate here without a client deploy.
  location = /discord {
    return 302 https://discord.gg/2JWYjsfVMh;
  }

  # Search engines: robots + sitemap are rendered by the server (absolute URLs need the
  # request host — the deploy origin is never known at build time), like the OG pages.
  location = /robots.txt {
    rewrite ^ /api/v1/og/robots.txt last;
  }
  location = /sitemap.xml {
    rewrite ^ /api/v1/og/sitemap.xml last;
  }

  # Social-preview targets: bots are rewritten into the /api/ proxy (the OG renderer
  # builds absolute image URLs from the forwarded Host/proto headers set above).
  location = / {
    if ($og_bot) {
      rewrite ^ /api/v1/og/page?path=/ last;
    }
    try_files /index.html =404;
  }
  location ~ ^/(room|replay)/ {
    if ($og_bot) {
      rewrite ^ /api/v1/og/page?path=$uri last;
    }
    try_files /index.html =404;
  }
  # Shared-map links (/maps?code=XXXXXXXX): nginx appends the original query string to the
  # rewritten one, so the OG renderer receives both path=/maps and the code parameter.
  location = /maps {
    if ($og_bot) {
      rewrite ^ /api/v1/og/page?path=/maps last;
    }
    try_files /index.html =404;
  }

  # SPA fallback.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
