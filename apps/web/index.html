<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <link rel="icon" href="%BASE_URL%favicon.png" sizes="any" />
    <link rel="icon" href="%BASE_URL%icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="%BASE_URL%favicon.png" />
    <title>台鐵任務 TRMission</title>
    <!-- Static fallback meta. Recognized link-preview crawlers hitting /, /room/* or /replay/*
         are routed (by nginx in prod, a Vite dev-server plugin in dev) to the server's OG
         renderer instead, which serves a per-link title/description and a purpose-built card
         image — richer than what's here. Everything else (including a plain browser's "view
         source", which never matches the crawler UA allowlist) reads these static tags, so
         og:image is root-relative rather than omitted: it can't be an absolute URL at build
         time (the deploy origin isn't known), but browsers and most real crawlers resolve a
         root-relative image URL against the page origin fine. -->
    <meta
      name="description"
      content="搶佔台灣鐵道路線 — 鋪設路線、連接城市、完成任務。A railway board game set in Taiwan: claim routes, link cities, complete missions."
    />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="台鐵任務 TRMission" />
    <meta property="og:title" content="台鐵任務 TRMission" />
    <meta
      property="og:description"
      content="搶佔台灣鐵道路線 — 鋪設路線、連接城市、完成任務。A railway board game set in Taiwan: claim routes, link cities, complete missions."
    />
    <meta property="og:image" content="/api/v1/og/site.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="zh_TW" />
    <meta property="og:locale:alternate" content="en_US" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="台鐵任務 TRMission" />
    <meta
      name="twitter:description"
      content="搶佔台灣鐵道路線 — 鋪設路線、連接城市、完成任務。A railway board game set in Taiwan: claim routes, link cities, complete missions."
    />
    <meta name="twitter:image" content="/api/v1/og/site.png" />
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#f6f1e7" />
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#1a1c1f" />
    <script>
      // Resolve the saved theme before first paint to avoid a light/dark flash.
      (function () {
        try {
          var t = localStorage.getItem('trm.theme') || 'system';
          var dark =
            t === 'dark' ||
            (t === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
          document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
        } catch (e) {
          /* storage unavailable — CSS @media fallback handles it */
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <noscript>
      <h1>台鐵任務 TRMission</h1>
      <p>
        《台鐵任務》是一款免費的線上多人鐵道桌遊：收集車廂卡、佔領台灣城市之間的路線、完成任務卡。
        支援 2–5 人連線對戰、機器人陪練、觀戰與對局回放。需要啟用 JavaScript 才能遊玩。
      </p>
      <p>
        TRMission is a free online multiplayer railway board game set in Taiwan: collect train-car
        cards, claim routes between cities, and complete mission tickets. Playing requires
        JavaScript to be enabled.
      </p>
    </noscript>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
