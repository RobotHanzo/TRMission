<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>台鐵任務 TRMission</title>
    <!-- Static fallback meta. Crawlers hitting /, /room/* or /replay/* are routed by nginx to
         the server's OG renderer (per-link titles + card images); everything else reads these. -->
    <meta
      name="description"
      content="台灣鐵道路線競逐桌遊 — 鋪設路線、連接城市、完成任務。A railway board game set in Taiwan: claim routes, link cities, complete missions."
    />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="台鐵任務 TRMission" />
    <meta property="og:title" content="台鐵任務 TRMission" />
    <meta
      property="og:description"
      content="台灣鐵道路線競逐桌遊 — 鋪設路線、連接城市、完成任務。A railway board game set in Taiwan: claim routes, link cities, complete missions."
    />
    <meta name="twitter:card" content="summary_large_image" />
    <script>
      // Resolve the saved theme before first paint to avoid a light/dark flash.
      (function () {
        try {
          var t = localStorage.getItem('trm.theme') || 'system';
          var dark =
            t === 'dark' ||
            (t === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
          document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
        } catch (e) {
          /* storage unavailable — CSS @media fallback handles it */
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
