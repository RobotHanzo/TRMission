name: mobile-android

# Continuous Native Generation: android/ is produced by `expo prebuild` here, never committed.
# Signing is self-managed (no EAS) via AGP's injected-signing properties.
on:
  push:
    branches: ['release/**']
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ubuntu-latest ships ~70GB of preinstalled tooling this JS/Android/Ruby pipeline never
      # touches (.NET, Haskell, CodeQL, Docker images, ...), leaving only ~14GB free. Compiling
      # react-native-skia's native code for all 4 ABIs plus the release bundling step exhausts
      # that, failing packageReleaseBundle with "No space left on device". Reclaim space up
      # front rather than dropping build architectures (a product-facing device-support call).
      - name: Free up disk space for the native build
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/share/boost /opt/hostedtoolcache/CodeQL
          docker image prune -af || true
          df -h /

      # ccache hashes each compiler invocation's preprocessed source, so it survives android/ being
      # regenerated from scratch every run by expo prebuild (CNG, gitignored — see top-of-file note),
      # unlike a plain directory cache keyed on file mtimes. This is what actually cuts the ~26-32min
      # native-build phase: the ~9 autolinked native modules (Skia bindings, Reanimated, Worklets,
      # gesture-handler, screens, expo-modules-core, ...) recompile identical C++ on every run today.
      # One shared key (not split by tag vs workflow_dispatch) lets a 2-ABI dev build's objects serve
      # as partial hits for a 4-ABI release build and vice versa.
      - name: ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: mobile-android
          max-size: 2G

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true
          working-directory: apps/mobile
      - uses: ./.github/actions/setup-yarn

      # apps/mobile imports @trm/proto, whose src/gen/** is buf-generated and gitignored (see
      # root CLAUDE.md) — without this, Metro fails to resolve the generated *_pb modules when
      # Gradle's createBundleReleaseJsAndAssets task bundles the release JS.
      - run: yarn workspace @trm/proto generate

      # Yarn 4 defaults enableScripts to false, so @shopify/react-native-skia's postinstall
      # (which copies its prebuilt libskia.a et al into libs/android) never runs — CMake then
      # fails with "Skia prebuilt binaries not found". Run its bin script manually instead of
      # flipping enableScripts repo-wide (that would also re-enable every other dependency's
      # postinstall).
      - run: npx install-skia

      # BUILD_NUMBER is versionCode/CFBundleVersion (docs/release/mobile-versioning.md): only a
      # `v<semver>+<build>` tag carries a real one — branch pushes stay at the dev fallback (1) and
      # are never published to Play (see the publish step's `if:` below). A tag push that DOESN'T
      # match must fail loudly here rather than silently fall back to 1: versionCode 1 is always
      # already taken (the mandatory manual bootstrap upload, docs/release/play-console-setup.md
      # Step 5, consumes it), so a silent fallback just wastes a full ~30min build before Play's
      # upload step rejects it with "Version code 1 has already been used".
      - name: Derive BUILD_NUMBER from the release tag
        id: build_number
        run: |
          if [[ "$GITHUB_REF_TYPE" == "tag" ]]; then
            if [[ "$GITHUB_REF_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+\+([0-9]+)$ ]]; then
              echo "value=${BASH_REMATCH[1]}" >> "$GITHUB_OUTPUT"
            else
              echo "::error::Tag '$GITHUB_REF_NAME' doesn't match v<semver>+<build> (e.g. v1.0.0+1) — refusing to build/publish with the dev fallback BUILD_NUMBER=1, which Play will reject as already used. Re-tag as v<semver>+<build>."
              exit 1
            fi
          else
            echo "value=1" >> "$GITHUB_OUTPUT"
          fi

      - name: Prebuild the Android native project
        working-directory: apps/mobile
        run: npx expo prebuild --platform android --no-install
        env:
          TRM_SERVER_ORIGIN: ${{ vars.TRM_SERVER_ORIGIN }}
          TRM_GOOGLE_WEB_CLIENT_ID: ${{ vars.TRM_GOOGLE_WEB_CLIENT_ID }}
          TRM_GOOGLE_IOS_CLIENT_ID: ${{ vars.TRM_GOOGLE_IOS_CLIENT_ID }}
          BUILD_NUMBER: ${{ steps.build_number.outputs.value }}
          # Only a real v* tag reaches Play (see the publish step's `if:` below) — everything else
          # (workflow_dispatch, release/** pushes) just needs a build to exist, so scope those down
          # to one physical-device ABI + one emulator ABI. Profiling showed the ~9 native modules'
          # (Skia bindings, Reanimated, Worklets, ...) serialized per-ABI CMake builds eating ~26 of
          # ~34min; halving the ABI count roughly halves that. app.config.ts's withGradleProperties
          # turns this into the generated gradle.properties' `reactNativeArchitectures`.
          TRM_ANDROID_ABIS: ${{ github.ref_type != 'tag' && 'arm64-v8a,x86_64' || '' }}

      # Deferred until after prebuild: `cache: gradle` hashes **/*.gradle*/gradle-wrapper.properties
      # to key its cache, but android/ is CNG output (gitignored, never committed — see the top-of-file
      # note) and doesn't exist until the prebuild step above runs.
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Decode the release keystore
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > "$RUNNER_TEMP/release.keystore"

      # Without --parallel, Gradle runs one task at a time across the whole module graph even
      # though the per-ABI native (CMake/ninja) builds for the ~9 native modules (Skia bindings,
      # Reanimated, Worklets, gesture-handler, screens, expo-modules-core, ...) have no
      # dependencies on each other. Profiling a run showed that fully serial native-build phase
      # alone eating ~26 of the ~34min total. --build-cache lets task outputs (compile, lint,
      # resource merge) persist across runs too, riding the ~/.gradle/caches cache that
      # setup-java's `cache: gradle` (above) already restores/saves.
      - name: Build the signed AAB
        working-directory: apps/mobile/android
        env:
          # CMake (>=3.4) seeds CMAKE_<LANG>_COMPILER_LAUNCHER from these env vars on first configure,
          # applying to every autolinked module's externalNativeBuild without patching their
          # node_modules build.gradle files individually.
          CMAKE_C_COMPILER_LAUNCHER: ccache
          CMAKE_CXX_COMPILER_LAUNCHER: ccache
        run: |
          ./gradlew :app:bundleRelease --parallel --build-cache \
            -Pandroid.injected.signing.store.file="$RUNNER_TEMP/release.keystore" \
            -Pandroid.injected.signing.store.password="${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" \
            -Pandroid.injected.signing.key.alias="${{ secrets.ANDROID_KEY_ALIAS }}" \
            -Pandroid.injected.signing.key.password="${{ secrets.ANDROID_KEY_PASSWORD }}"

      - uses: actions/upload-artifact@v4
        with:
          name: trmission-release-aab
          path: apps/mobile/android/app/build/outputs/bundle/release/*.aab
          if-no-files-found: error

      # Only a real release tag publishes — see docs/release/play-console-setup.md for the one-time
      # Play Console + service-account setup this depends on. Always the internal track only; promote
      # to production locally with `fastlane android promote` once the track is verified.
      - name: Decode the Play service account key
        if: github.ref_type == 'tag'
        run: echo "${{ secrets.PLAY_JSON_KEY_BASE64 }}" | base64 -d > "$RUNNER_TEMP/play-key.json"

      - name: Upload to Play's internal testing track
        if: github.ref_type == 'tag'
        working-directory: apps/mobile
        run: bundle exec fastlane android internal
        env:
          PLAY_JSON_KEY_FILE: ${{ runner.temp }}/play-key.json
