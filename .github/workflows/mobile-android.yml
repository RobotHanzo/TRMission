name: mobile-android

# Continuous Native Generation: android/ is produced by `expo prebuild` here, never committed.
# Signing is self-managed (no EAS) via AGP's injected-signing properties.
on:
  push:
    branches: ['release/**']
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ubuntu-latest ships ~70GB of preinstalled tooling this JS/Android/Ruby pipeline never
      # touches (.NET, Haskell, CodeQL, Docker images, ...), leaving only ~14GB free. Compiling
      # react-native-skia's native code for all 4 ABIs plus the release bundling step exhausts
      # that, failing packageReleaseBundle with "No space left on device". Reclaim space up
      # front rather than dropping build architectures (a product-facing device-support call).
      - name: Free up disk space for the native build
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/share/boost /opt/hostedtoolcache/CodeQL
          docker image prune -af || true
          df -h /

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true
          working-directory: apps/mobile
      - uses: ./.github/actions/setup-yarn

      # apps/mobile imports @trm/proto, whose src/gen/** is buf-generated and gitignored (see
      # root CLAUDE.md) — without this, Metro fails to resolve the generated *_pb modules when
      # Gradle's createBundleReleaseJsAndAssets task bundles the release JS.
      - run: yarn workspace @trm/proto generate

      # Yarn 4 defaults enableScripts to false, so @shopify/react-native-skia's postinstall
      # (which copies its prebuilt libskia.a et al into libs/android) never runs — CMake then
      # fails with "Skia prebuilt binaries not found". Run its bin script manually instead of
      # flipping enableScripts repo-wide (that would also re-enable every other dependency's
      # postinstall).
      - run: npx install-skia

      # BUILD_NUMBER is versionCode/CFBundleVersion (docs/release/mobile-versioning.md): only a
      # `v<semver>+<build>` tag carries a real one — branch pushes stay at the dev fallback (1) and
      # are never published to Play (see the publish step's `if:` below).
      - name: Derive BUILD_NUMBER from the release tag
        id: build_number
        run: |
          if [[ "$GITHUB_REF_TYPE" == "tag" && "$GITHUB_REF_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+\+([0-9]+)$ ]]; then
            echo "value=${BASH_REMATCH[1]}" >> "$GITHUB_OUTPUT"
          else
            echo "value=1" >> "$GITHUB_OUTPUT"
          fi

      - name: Prebuild the Android native project
        working-directory: apps/mobile
        run: npx expo prebuild --platform android --no-install
        env:
          TRM_SERVER_ORIGIN: ${{ vars.TRM_SERVER_ORIGIN }}
          TRM_GOOGLE_WEB_CLIENT_ID: ${{ vars.TRM_GOOGLE_WEB_CLIENT_ID }}
          TRM_GOOGLE_IOS_CLIENT_ID: ${{ vars.TRM_GOOGLE_IOS_CLIENT_ID }}
          BUILD_NUMBER: ${{ steps.build_number.outputs.value }}

      - name: Decode the release keystore
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > "$RUNNER_TEMP/release.keystore"

      - name: Build the signed AAB
        working-directory: apps/mobile/android
        run: |
          ./gradlew :app:bundleRelease \
            -Pandroid.injected.signing.store.file="$RUNNER_TEMP/release.keystore" \
            -Pandroid.injected.signing.store.password="${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" \
            -Pandroid.injected.signing.key.alias="${{ secrets.ANDROID_KEY_ALIAS }}" \
            -Pandroid.injected.signing.key.password="${{ secrets.ANDROID_KEY_PASSWORD }}"

      - uses: actions/upload-artifact@v4
        with:
          name: trmission-release-aab
          path: apps/mobile/android/app/build/outputs/bundle/release/*.aab
          if-no-files-found: error

      # Only a real release tag publishes — see docs/release/play-console-setup.md for the one-time
      # Play Console + service-account setup this depends on. Always the internal track only; promote
      # to production locally with `fastlane android promote` once the track is verified.
      - name: Decode the Play service account key
        if: github.ref_type == 'tag'
        run: echo "${{ secrets.PLAY_JSON_KEY_BASE64 }}" | base64 -d > "$RUNNER_TEMP/play-key.json"

      - name: Upload to Play's internal testing track
        if: github.ref_type == 'tag'
        working-directory: apps/mobile
        run: bundle exec fastlane android internal
        env:
          PLAY_JSON_KEY_FILE: ${{ runner.temp }}/play-key.json
