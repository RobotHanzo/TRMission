name: mobile-ios

# macOS runners bill ~10x, so this lane is gated to release branches/tags only. Continuous Native
# Generation: ios/ is produced by `expo prebuild`, never committed. Signing via fastlane match
# (certs/profiles in a private git repo) — no EAS.
on:
  push:
    branches: ['release/**']
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: yarn
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true
          working-directory: apps/mobile
      - run: corepack enable
      - run: yarn install --immutable

      # apps/mobile imports @trm/proto, whose src/gen/** is buf-generated and gitignored (see
      # root CLAUDE.md) — without this, Metro fails to resolve the generated *_pb modules when
      # the Xcode build phase bundles the release JS.
      - run: yarn workspace @trm/proto generate

      # Same BUILD_NUMBER axis as mobile-android.yml (docs/release/mobile-versioning.md) — keeps
      # CFBundleVersion in lockstep with versionCode so a `v<semver>+<build>` tag ships one build
      # number to both stores. Branch pushes stay at the fallback (1); TestFlight will reject a
      # second upload at the same build number, so don't tag-push twice without bumping +<build>.
      - name: Derive BUILD_NUMBER from the release tag
        id: build_number
        run: |
          if [[ "$GITHUB_REF_TYPE" == "tag" && "$GITHUB_REF_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+\+([0-9]+)$ ]]; then
            echo "value=${BASH_REMATCH[1]}" >> "$GITHUB_OUTPUT"
          else
            echo "value=1" >> "$GITHUB_OUTPUT"
          fi

      - name: Prebuild the iOS native project
        working-directory: apps/mobile
        run: npx expo prebuild --platform ios --no-install
        env:
          TRM_SERVER_ORIGIN: ${{ vars.TRM_SERVER_ORIGIN }}
          TRM_GOOGLE_WEB_CLIENT_ID: ${{ vars.TRM_GOOGLE_WEB_CLIENT_ID }}
          TRM_GOOGLE_IOS_CLIENT_ID: ${{ vars.TRM_GOOGLE_IOS_CLIENT_ID }}
          BUILD_NUMBER: ${{ steps.build_number.outputs.value }}

      - name: Install CocoaPods
        working-directory: apps/mobile/ios
        run: pod install

      - name: Build + upload to TestFlight
        working-directory: apps/mobile
        run: bundle exec fastlane ios beta
        env:
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_P8: ${{ secrets.ASC_KEY_P8 }}
