name: mobile-ios

# macOS runners bill ~10x on private plans, so this lane is gated to release branches/tags (plus
# a twice-weekly cache warm-up on main — see the schedule note below). Continuous Native
# Generation: ios/ is produced by `expo prebuild`, never committed. Signing via fastlane match
# (certs/profiles in a private git repo, seeded by the mobile-ios-certs workflow — no Mac, no EAS).
# Every run produces an .ipa artifact; a real v<semver>+<build> tag also uploads to TestFlight, and
# so does a manual workflow_dispatch run with publish=true + build_number (same publish gate as
# mobile-android.yml).
on:
  push:
    branches: ['release/**']
    tags: ['v*']
  # GitHub evicts any cache untouched for 7 days, and this lane only fires on release/** + tags —
  # so between releases the ccache/Pods/node_modules caches age out and the next release build is
  # cold. A twice-weekly warm-up on main keeps them fresh, same as mobile-android.yml (and free
  # despite the macOS multiplier: this repo is public, so GitHub-hosted minutes aren't billed).
  # A scheduled run takes the plain non-tag path — BUILD_NUMBER=1, upload:false — and can never
  # reach TestFlight.
  schedule:
    - cron: '0 4 * * 1,4'
  workflow_dispatch:
    inputs:
      publish:
        description: 'Upload this build to TestFlight'
        type: boolean
        default: false
      build_number:
        description: 'BUILD_NUMBER (CFBundleVersion) to stamp — required when publish is enabled, since a manual run has no v<semver>+<build> tag to derive one from (docs/release/mobile-versioning.md)'
        type: string
        default: ''
      app_version:
        description: 'APP_VERSION (CFBundleShortVersionString, e.g. 1.0.0) to stamp — required when publish is enabled, since a manual run has no v<semver>+<build> tag to derive one from (docs/release/mobile-versioning.md)'
        type: string
        default: ''

permissions:
  contents: read

jobs:
  build:
    # macos-26, not macos-latest: the Liquid Glass `.icon` bundle (app.config.ts ios.icon) needs
    # Xcode 26's actool — the macos-latest label only finishes flipping to macOS 26 during the
    # June 2026 rollout, and a stray macOS 15 (Xcode 16) runner would fail the asset compile.
    runs-on: macos-26
    # Same CI footgun mobile-android.yml documents: CNG regenerates ios/ every run and node_modules
    # is restored from cache, all with fresh mtimes, so ccache's defaults would miss nearly every
    # object. Hash the compiler by CONTENT, and add the Xcode-specific sloppiness + depend-mode set
    # from RN's build-speed docs — clang-modules compiles (this app injects use_modular_headers!,
    # see app.config.ts) are only cacheable at all with depend_mode plus `modules`/`pch_defines`
    # sloppiness, and Xcode's -ivfsoverlay/index-store args need their entries too. These env vars
    # override the ccache config the ccache-action writes.
    env:
      CCACHE_COMPILERCHECK: content
      CCACHE_SLOPPINESS: clang_index_store,file_stat_matches,include_file_ctime,include_file_mtime,ivfsoverlay,pch_defines,modules,system_headers,time_macros
      CCACHE_FILECLONE: 'true'
      CCACHE_DEPEND: 'true'
      CCACHE_INODECACHE: 'true'
    steps:
      - uses: actions/checkout@v4

      # Compile cache for everything still built from source — expo-modules-core, codegen output,
      # and the autolinked pods; RN core + its third-party deps come prebuilt via the RCT_* flags
      # on the pod install step below. Must be installed BEFORE `pod install` — react_native_post_install probes
      # `command -v ccache` at pod-install time and only points CC/CXX at RN's ccache wrappers
      # (with the resolved CCACHE_BINARY path baked in) when the binary already exists.
      - name: ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: mobile-ios
          # One platform, one arch (device arm64) — proportionally smaller than Android's
          # 4-ABI 5G. verbose:2 prints `ccache -s` in the post step so the real hit rate is
          # visible — read it together with the job-level CCACHE_* env above.
          max-size: 2G
          verbose: 2
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true
          working-directory: apps/mobile
      - uses: ./.github/actions/setup-yarn

      # apps/mobile imports @trm/proto, whose src/gen/** is buf-generated and gitignored (see
      # root CLAUDE.md) — without this, Metro fails to resolve the generated *_pb modules when
      # the Xcode build phase bundles the release JS.
      - run: yarn workspace @trm/proto generate

      # Yarn 4 defaults enableScripts to false, so @shopify/react-native-skia's postinstall
      # (which copies its prebuilt xcframeworks into libs/ios) never runs — the Xcode build
      # then fails to find the Skia binaries. Run its bin script manually instead of flipping
      # enableScripts repo-wide (that would also re-enable every other dependency's postinstall).
      - run: npx install-skia

      # Same BUILD_NUMBER + APP_VERSION axes as mobile-android.yml (docs/release/mobile-versioning.md)
      # — keeps CFBundleVersion in lockstep with versionCode and CFBundleShortVersionString with
      # versionName, so a `v<semver>+<build>` tag ships identical version metadata to both stores.
      # Branch pushes stay at the fallback (BUILD_NUMBER=1); TestFlight will reject a second upload
      # at the same build number, so don't tag-push twice without bumping +<build>. A tag push that
      # doesn't match the pattern must fail loudly rather than silently build with the fallback —
      # see mobile-android.yml's identical guard for why. A manual publish=true dispatch has no tag
      # to derive these from, so it must supply both build_number and app_version inputs instead —
      # same "fail loudly, don't fall back" reasoning.
      - name: Derive BUILD_NUMBER + APP_VERSION from the release tag
        id: build_number
        run: |
          if [[ "$GITHUB_REF_TYPE" == "tag" ]]; then
            if [[ "$GITHUB_REF_NAME" =~ ^v([0-9]+\.[0-9]+\.[0-9]+)\+([0-9]+)$ ]]; then
              echo "version=${BASH_REMATCH[1]}" >> "$GITHUB_OUTPUT"
              echo "value=${BASH_REMATCH[2]}" >> "$GITHUB_OUTPUT"
            else
              echo "::error::Tag '$GITHUB_REF_NAME' doesn't match v<semver>+<build> (e.g. v1.0.0+1) — refusing to build/publish with the dev fallback BUILD_NUMBER=1. Re-tag as v<semver>+<build>."
              exit 1
            fi
          elif [[ "${{ inputs.publish }}" == "true" ]]; then
            if [[ "${{ inputs.build_number }}" =~ ^[0-9]+$ ]]; then
              echo "value=${{ inputs.build_number }}" >> "$GITHUB_OUTPUT"
            else
              echo "::error::publish=true requires a numeric build_number input — got '${{ inputs.build_number }}'. Manual dispatch has no v<semver>+<build> tag to derive one from, and TestFlight will reject a re-used build number."
              exit 1
            fi
            if [[ "${{ inputs.app_version }}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "version=${{ inputs.app_version }}" >> "$GITHUB_OUTPUT"
            else
              echo "::error::publish=true requires a semver app_version input (e.g. 1.0.0) — got '${{ inputs.app_version }}'."
              exit 1
            fi
          else
            echo "value=1" >> "$GITHUB_OUTPUT"
          fi

      - name: Prebuild the iOS native project
        working-directory: apps/mobile
        run: npx expo prebuild --platform ios --no-install
        env:
          TRM_SERVER_ORIGIN: ${{ vars.TRM_SERVER_ORIGIN }}
          TRM_GOOGLE_WEB_CLIENT_ID: ${{ vars.TRM_GOOGLE_WEB_CLIENT_ID }}
          TRM_GOOGLE_IOS_CLIENT_ID: ${{ vars.TRM_GOOGLE_IOS_CLIENT_ID }}
          # iOS-only (unlike mobile-android.yml): the reversed Google OAuth client id becomes a
          # CFBundleURLScheme in Info.plist — without the real value, Google sign-in can never
          # return to the app (the placeholder fallback only exists to let builds run pre-P6).
          TRM_GOOGLE_IOS_URL_SCHEME: ${{ vars.TRM_GOOGLE_IOS_URL_SCHEME }}
          # Baked into Expo.plist as updates.url — unset would ship binaries pointing OTA checks
          # at app.config.ts's localhost dev default.
          TRM_OTA_URL: ${{ vars.TRM_OTA_URL }}
          BUILD_NUMBER: ${{ steps.build_number.outputs.value }}
          APP_VERSION: ${{ steps.build_number.outputs.version }}

      # Keyed on the prebuild-generated Podfile (ios/ itself isn't committed — see the CNG note
      # above) PLUS yarn.lock: the Podfile is a near-static template — the actual pod set and
      # versions come from autolinking over node_modules — so with the Podfile alone in the key a
      # JS dep bump would restore the same stale exact-match forever and re-run the identical
      # delta `pod install` on every build without ever saving the updated Pods back.
      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/CocoaPods
            apps/mobile/ios/Pods
          key: cocoapods-${{ hashFiles('apps/mobile/ios/Podfile') }}-${{ hashFiles('yarn.lock') }}
          restore-keys: |
            cocoapods-${{ hashFiles('apps/mobile/ios/Podfile') }}-
            cocoapods-

      - name: Install CocoaPods
        working-directory: apps/mobile/ios
        run: pod install
        env:
          # Expo's Podfile template checks USE_CCACHE before Podfile.properties.json's
          # apple.ccacheEnabled when deciding whether react_native_post_install wires CC/CXX to
          # RN's ccache wrappers. Deliberately env-only, NOT expo-build-properties'
          # ios.ccacheEnabled: that would change the resolved app config and shift the OTA
          # runtimeVersion fingerprint — exactly what .fingerprintignore keeps RNRepo's
          # prebuilt-vs-source choice from doing — cutting already-shipped binaries off from
          # JS-only OTA fixes until the next store build. A pod-install-time env var is invisible
          # to the fingerprint, and a no-op wherever ccache isn't installed.
          USE_CCACHE: '1'
          # RN 0.85's official prebuilt binaries (Meta-built, on Maven Central — verified present
          # for this exact RN version): core + the folly/glog/boost third-party deps skip the two
          # biggest source compiles outright, and the symbolicate flag downloads their matching
          # dSYMs into the framework folders so crash symbolication doesn't regress. All three are
          # read at pod-install time only, auto-revert to building from source when the artifacts
          # are missing (e.g. right after an RN bump, before Meta publishes), and — like USE_CCACHE
          # above — are invisible to the OTA runtimeVersion fingerprint. The tarballs land in
          # Pods/ReactNative{Core,Dependencies}-artifacts, so the Pods cache above carries them
          # across runs.
          RCT_USE_PREBUILT_RNCORE: '1'
          RCT_USE_RN_DEP: '1'
          RCT_SYMBOLICATE_PREBUILT_FRAMEWORKS: '1'

      # RCT_SYMBOLICATE_PREBUILT_FRAMEWORKS above places each fetched dSYM at
      # React.xcframework/<slice>/React.framework/dSYMs/ (facebook/react-native's own
      # scripts/cocoapods/rncore.rb, slice_dsym_dest) — nested one level INSIDE the framework
      # bundle, instead of alongside it as a sibling of the slice's .framework the way Apple's
      # xcframework Info.plist DebugSymbolsPath convention expects. Left there, it rides along as
      # ordinary bundle content when Xcode embeds+codesigns the framework, and App Store Connect
      # rejects the shipped .app for it ("Invalid bundle structure", ITMS 90171 — this broke
      # v0.1.14+14's first TestFlight upload attempt). It must be stripped from this exact Pods
      # copy, BEFORE the "Build" step below ever runs xcodebuild: stripping it from the already
      # zipped-and-signed .ipa afterwards was tried and made things worse (it punches a hole in a
      # signature Xcode already sealed over the folder — ITMS 90034, "Missing or invalid
      # signature" — v0.1.14+14's second attempt). The `find`/`echo` output here is deliberately
      # unconditional (not gated behind "if found") so a still-failing next run has real on-disk
      # evidence to work from instead of another guess. No dSYM survives for Xcode to seal or
      # ship — this trades away RCT_SYMBOLICATE_PREBUILT_FRAMEWORKS's one job until upstream RN
      # stops nesting the dSYM inside the framework it documents alongside; a build that can't
      # reach TestFlight isn't a usable alternative. A future RN release that fixes the nesting
      # makes this a no-op (find just prints nothing to remove).
      - name: Strip nested dSYMs from vendored prebuilt frameworks (RN dSYM/codesign bug workaround)
        working-directory: apps/mobile/ios
        run: |
          echo "--- dSYM-related paths under Pods before cleanup ---"
          find Pods \( -iname 'dSYMs' -o -iname '*.dSYM' \) 2>/dev/null
          echo "--- stripping nested dSYMs dirs (path */<name>.framework/dSYMs) ---"
          find Pods -type d -path '*.framework/dSYMs' -print -exec rm -rf {} +
          echo "--- dSYM-related paths under Pods after cleanup (should exclude anything under a .framework) ---"
          find Pods \( -iname 'dSYMs' -o -iname '*.dSYM' \) 2>/dev/null

      # The Fastfile hardcodes workspace/scheme "TRMission" (derived from prebuild's
      # HelloWorld→sanitizedName rename). Assert it here so an Expo template change fails in
      # seconds with a directory listing, not 10+ minutes later inside xcodebuild.
      - name: Verify the Xcode workspace name the Fastfile expects
        run: |
          if [[ ! -d "apps/mobile/ios/TRMission.xcworkspace" ]]; then
            echo "::error::ios/TRMission.xcworkspace not found — prebuild's naming changed; update workspace:/scheme: in apps/mobile/fastlane/Fastfile"
            ls apps/mobile/ios
            exit 1
          fi

      # upload:true on a real release tag, or on a manual dispatch with publish=true (which supplies
      # its own build_number input above) — a plain branch push or a dispatch without publish
      # carries the fallback BUILD_NUMBER=1, which TestFlight would reject as a duplicate after the
      # first upload.
      - name: Build (and on a release tag or publish=true dispatch, upload to TestFlight)
        working-directory: apps/mobile
        run: bundle exec fastlane ios beta upload:${{ github.ref_type == 'tag' || inputs.publish == true }}
        env:
          # The SAME app-config env as the prebuild step above — the runtime
          # `Constants.expoConfig.extra` is NOT baked at prebuild: expo-constants' Xcode script
          # phase re-evaluates app.config.ts DURING this gym build and serializes the result
          # into the app bundle (and expo-updates embeds its manifest the same way). Scoping
          # these vars to prebuild only shipped binaries with empty extra.google*ClientId,
          # which is exactly the gate that hides the Google sign-in button (LoginScreen's
          # `!!GOOGLE_WEB_CLIENT_ID`). Keep both env blocks in lockstep.
          TRM_SERVER_ORIGIN: ${{ vars.TRM_SERVER_ORIGIN }}
          TRM_GOOGLE_WEB_CLIENT_ID: ${{ vars.TRM_GOOGLE_WEB_CLIENT_ID }}
          TRM_GOOGLE_IOS_CLIENT_ID: ${{ vars.TRM_GOOGLE_IOS_CLIENT_ID }}
          TRM_GOOGLE_IOS_URL_SCHEME: ${{ vars.TRM_GOOGLE_IOS_URL_SCHEME }}
          TRM_OTA_URL: ${{ vars.TRM_OTA_URL }}
          BUILD_NUMBER: ${{ steps.build_number.outputs.value }}
          APP_VERSION: ${{ steps.build_number.outputs.version }}
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_P8: ${{ secrets.ASC_KEY_P8 }}
          APPLE_TEAM_ID: ${{ vars.APPLE_TEAM_ID }}

      - uses: actions/upload-artifact@v4
        with:
          name: trmission-release-ipa
          path: apps/mobile/build/*.ipa
          if-no-files-found: error
