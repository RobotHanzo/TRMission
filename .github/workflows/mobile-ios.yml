name: mobile-ios

# macOS runners bill ~10x, so this lane is gated to release branches/tags only. Continuous Native
# Generation: ios/ is produced by `expo prebuild`, never committed. Signing via fastlane match
# (certs/profiles in a private git repo, seeded by the mobile-ios-certs workflow — no Mac, no EAS).
# Every run produces an .ipa artifact; only a real v<semver>+<build> tag also uploads to TestFlight
# (same publish gate as mobile-android.yml).
on:
  push:
    branches: ['release/**']
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true
          working-directory: apps/mobile
      - uses: ./.github/actions/setup-yarn

      # apps/mobile imports @trm/proto, whose src/gen/** is buf-generated and gitignored (see
      # root CLAUDE.md) — without this, Metro fails to resolve the generated *_pb modules when
      # the Xcode build phase bundles the release JS.
      - run: yarn workspace @trm/proto generate

      # Yarn 4 defaults enableScripts to false, so @shopify/react-native-skia's postinstall
      # (which copies its prebuilt xcframeworks into libs/ios) never runs — the Xcode build
      # then fails to find the Skia binaries. Run its bin script manually instead of flipping
      # enableScripts repo-wide (that would also re-enable every other dependency's postinstall).
      - run: npx install-skia

      # Same BUILD_NUMBER axis as mobile-android.yml (docs/release/mobile-versioning.md) — keeps
      # CFBundleVersion in lockstep with versionCode so a `v<semver>+<build>` tag ships one build
      # number to both stores. Branch pushes stay at the fallback (1); TestFlight will reject a
      # second upload at the same build number, so don't tag-push twice without bumping +<build>.
      # A tag push that doesn't match the pattern must fail loudly rather than silently build with
      # the fallback — see mobile-android.yml's identical guard for why.
      - name: Derive BUILD_NUMBER from the release tag
        id: build_number
        run: |
          if [[ "$GITHUB_REF_TYPE" == "tag" ]]; then
            if [[ "$GITHUB_REF_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+\+([0-9]+)$ ]]; then
              echo "value=${BASH_REMATCH[1]}" >> "$GITHUB_OUTPUT"
            else
              echo "::error::Tag '$GITHUB_REF_NAME' doesn't match v<semver>+<build> (e.g. v1.0.0+1) — refusing to build/publish with the dev fallback BUILD_NUMBER=1. Re-tag as v<semver>+<build>."
              exit 1
            fi
          else
            echo "value=1" >> "$GITHUB_OUTPUT"
          fi

      - name: Prebuild the iOS native project
        working-directory: apps/mobile
        run: npx expo prebuild --platform ios --no-install
        env:
          TRM_SERVER_ORIGIN: ${{ vars.TRM_SERVER_ORIGIN }}
          TRM_GOOGLE_WEB_CLIENT_ID: ${{ vars.TRM_GOOGLE_WEB_CLIENT_ID }}
          TRM_GOOGLE_IOS_CLIENT_ID: ${{ vars.TRM_GOOGLE_IOS_CLIENT_ID }}
          # iOS-only (unlike mobile-android.yml): the reversed Google OAuth client id becomes a
          # CFBundleURLScheme in Info.plist — without the real value, Google sign-in can never
          # return to the app (the placeholder fallback only exists to let builds run pre-P6).
          TRM_GOOGLE_IOS_URL_SCHEME: ${{ vars.TRM_GOOGLE_IOS_URL_SCHEME }}
          # Baked into Expo.plist as updates.url — unset would ship binaries pointing OTA checks
          # at app.config.ts's localhost dev default.
          TRM_OTA_URL: ${{ vars.TRM_OTA_URL }}
          BUILD_NUMBER: ${{ steps.build_number.outputs.value }}

      # Keyed on the prebuild-generated Podfile (ios/ itself isn't committed — see the CNG note
      # above), so this only misses when native deps actually change.
      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/CocoaPods
            apps/mobile/ios/Pods
          key: cocoapods-${{ hashFiles('apps/mobile/ios/Podfile') }}
          restore-keys: |
            cocoapods-

      - name: Install CocoaPods
        working-directory: apps/mobile/ios
        run: pod install

      # The Fastfile hardcodes workspace/scheme "TRMission" (derived from prebuild's
      # HelloWorld→sanitizedName rename). Assert it here so an Expo template change fails in
      # seconds with a directory listing, not 10+ minutes later inside xcodebuild.
      - name: Verify the Xcode workspace name the Fastfile expects
        run: |
          if [[ ! -d "apps/mobile/ios/TRMission.xcworkspace" ]]; then
            echo "::error::ios/TRMission.xcworkspace not found — prebuild's naming changed; update workspace:/scheme: in apps/mobile/fastlane/Fastfile"
            ls apps/mobile/ios
            exit 1
          fi

      # upload:true only on a real release tag — branch/dispatch runs all carry the fallback
      # BUILD_NUMBER=1, which TestFlight would reject as a duplicate after the first upload.
      - name: Build (and on a release tag, upload to TestFlight)
        working-directory: apps/mobile
        run: bundle exec fastlane ios beta upload:${{ github.ref_type == 'tag' }}
        env:
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_P8: ${{ secrets.ASC_KEY_P8 }}
          APPLE_TEAM_ID: ${{ vars.APPLE_TEAM_ID }}

      - uses: actions/upload-artifact@v4
        with:
          name: trmission-release-ipa
          path: apps/mobile/build/*.ipa
          if-no-files-found: error
