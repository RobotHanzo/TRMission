name: mobile-ios

# macOS runners bill ~10x, so this lane is gated to release branches/tags only. Continuous Native
# Generation: ios/ is produced by `expo prebuild`, never committed. Signing via fastlane match
# (certs/profiles in a private git repo) — no EAS.
on:
  push:
    branches: ['release/**']
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: yarn
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true
          working-directory: apps/mobile
      - run: corepack enable
      - run: yarn install --immutable

      - name: Prebuild the iOS native project
        working-directory: apps/mobile
        run: npx expo prebuild --platform ios --no-install
        env:
          TRM_SERVER_ORIGIN: ${{ vars.TRM_SERVER_ORIGIN }}
          TRM_GOOGLE_WEB_CLIENT_ID: ${{ vars.TRM_GOOGLE_WEB_CLIENT_ID }}
          TRM_GOOGLE_IOS_CLIENT_ID: ${{ vars.TRM_GOOGLE_IOS_CLIENT_ID }}

      - name: Install CocoaPods
        working-directory: apps/mobile/ios
        run: pod install

      - name: Build + upload to TestFlight
        working-directory: apps/mobile
        run: bundle exec fastlane ios beta
        env:
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_P8: ${{ secrets.ASC_KEY_P8 }}
