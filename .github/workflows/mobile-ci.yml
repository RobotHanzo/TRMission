name: mobile-ci

# Fast JS-level gate for the mobile workspace (no native build). The whole-repo CI still runs
# everything via turbo; this gives focused, quick feedback on mobile-touching PRs.
on:
  pull_request:
    paths:
      - 'apps/mobile/**'
      - 'packages/**'
      - '.github/workflows/mobile-ci.yml'

permissions:
  contents: read

concurrency:
  group: mobile-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-yarn
      # Same jest/babel transform cache the whole-repo CI keeps warm (see ci.yml).
      - uses: actions/cache@v4
        with:
          path: apps/mobile/.jest-cache
          key: jest-mobile-${{ runner.os }}-${{ hashFiles('yarn.lock', 'apps/mobile/babel.config.js') }}-${{ github.sha }}
          restore-keys: |
            jest-mobile-${{ runner.os }}-${{ hashFiles('yarn.lock', 'apps/mobile/babel.config.js') }}-
            jest-mobile-${{ runner.os }}-
      # Generated protobuf sources are gitignored and must exist before mobile imports @trm/proto.
      - run: yarn workspace @trm/proto generate
      - run: yarn workspace @trm/mobile typecheck
      - run: yarn workspace @trm/mobile lint
      - run: yarn workspace @trm/mobile test
      - run: yarn workspace @trm/mobile test:pure
