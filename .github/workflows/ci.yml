name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  checks: write

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: yarn

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Typecheck
        run: yarn typecheck

      - name: Lint
        run: yarn lint

      - name: Test
        run: yarn test -- --reporter=default --reporter=junit --outputFile.junit=test-results/junit.xml

      - name: Report test results
        uses: mikepenz/action-junit-report@v4
        if: always()
        with:
          report_paths: '**/test-results/junit.xml'
          detailed_summary: true
          include_passed: true
