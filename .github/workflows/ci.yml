name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  checks: write

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  # cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: yarn

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Cache mongodb-memory-server binary
        uses: actions/cache@v4
        with:
          path: ~/.cache/mongodb-binaries
          key: mongodb-binaries-${{ runner.os }}-${{ hashFiles('yarn.lock') }}

      # The mobile suite is jest+babel over the whole RN graph AND the raw-TS @trm packages. Cold,
      # that transform costs minutes — and because RN components require lazily, the cost lands
      # inside test bodies, which is what pushed the tutorial walkthrough past its timeout.
      - name: Cache jest transform cache (mobile)
        uses: actions/cache@v4
        with:
          path: apps/mobile/.jest-cache
          key: jest-mobile-${{ runner.os }}-${{ hashFiles('yarn.lock', 'apps/mobile/babel.config.js') }}-${{ github.sha }}
          restore-keys: |
            jest-mobile-${{ runner.os }}-${{ hashFiles('yarn.lock', 'apps/mobile/babel.config.js') }}-
            jest-mobile-${{ runner.os }}-

      - name: Typecheck
        run: yarn typecheck

      - name: Lint
        run: yarn lint

      - name: Warm MongoDB binary cache
        run: yarn workspace @trm/server warm-mongo

      - name: Test
        run: yarn test -- --reporter=default --reporter=junit --outputFile.junit=test-results/junit.xml

      - name: Report test results
        uses: mikepenz/action-junit-report@v4
        if: always()
        with:
          report_paths: '**/test-results/junit.xml'
          detailed_summary: true
          include_passed: true
