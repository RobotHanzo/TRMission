# TRMission infrastructure.
#
#   docker compose up -d mongo                        # dev DB only (run server/web via `yarn dev`)
#   docker compose --profile dev-server up --build    # mongo + server + vite web dev (http://localhost:5173)
#   docker compose --profile full up --build          # full stack: mongo + server + web
#
# The dev-server profile reads env from apps/server/.env (copy .env.example to get started).
# MONGO_URL is overridden to reach the mongo container — all other vars come from your .env file.
#
# Step C uses a standalone MongoDB — the persistence layer is single-writer-per-game
# and needs no multi-document transactions yet.
services:
  mongo:
    image: mongo:7
    container_name: trm-mongo
    ports:
      - '27017:27017'
    volumes:
      - trm-mongo-data:/data/db
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'mongosh', '--quiet', '--eval', "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Dev server: reads config from apps/server/.env, overrides MONGO_URL for the Docker network,
  # and runs with --watch for hot-reload.
  # Source files are bind-mounted for live sync; named volumes shield the container's
  # node_modules and generated proto files from being overwritten by the host tree.
  dev-server:
    profiles: ['dev-server']
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    command: yarn workspace @trm/server dev
    env_file:
      - path: apps/server/.env
        required: false
    environment:
      MONGO_URL: mongodb://mongo:27017
    depends_on:
      mongo:
        condition: service_healthy
    ports:
      - '3001:3001'
    volumes:
      - .:/app
      - trm-node-modules:/app/node_modules
      - trm-yarn-state:/app/.yarn
      - trm-proto-gen:/app/packages/proto/src/gen
    restart: unless-stopped

  # Vite dev server: proxies /api + /ws to the dev-server container.
  # VITE_SERVER_HOST routes the proxy to the Docker service name instead of localhost.
  web-dev:
    profiles: ['dev-server']
    build:
      context: .
      dockerfile: apps/server/Dockerfile
      target: deps
    command: yarn workspace @trm/web dev
    environment:
      VITE_SERVER_HOST: dev-server
    depends_on:
      - dev-server
    ports:
      - '5173:5173'
    volumes:
      - .:/app
      - trm-node-modules:/app/node_modules
      - trm-yarn-state:/app/.yarn
      - trm-proto-gen:/app/packages/proto/src/gen
    restart: unless-stopped

  server:
    profiles: ['full']
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    environment:
      PORT: '3001'
      MONGO_URL: mongodb://mongo:27017
      MONGO_DB: trmission
      JWT_SECRET: ${JWT_SECRET:-dev-insecure-change-me}
      CORS_ORIGINS: http://localhost:8080
      # Auth-method toggles (default on). Set to 0 to disable.
      AUTH_PASSWORD_LOGIN_ENABLED: ${AUTH_PASSWORD_LOGIN_ENABLED:-1}
      AUTH_GUEST_ENABLED: ${AUTH_GUEST_ENABLED:-1}
      # OAuth — a provider is enabled only when both id+secret are set. The web app + API must be
      # the same origin (nginx serves both here), so the Strict refresh cookie survives the callback.
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      DISCORD_CLIENT_ID: ${DISCORD_CLIENT_ID:-}
      DISCORD_CLIENT_SECRET: ${DISCORD_CLIENT_SECRET:-}
      OAUTH_REDIRECT_BASE: ${OAUTH_REDIRECT_BASE:-http://localhost:8080}
      # Maintainer dashboard: comma-separated emails granted the owner role at boot
      # (accounts must already be registered; served at /admin/ by the web container).
      DASHBOARD_OWNER_EMAILS: ${DASHBOARD_OWNER_EMAILS:-}
    depends_on:
      mongo:
        condition: service_healthy
    ports:
      - '3001:3001'
    restart: unless-stopped

  web:
    profiles: ['full']
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    depends_on:
      - server
    ports:
      - '8080:80'
    restart: unless-stopped

  # Self-hosted expo-updates server for the mobile app (spec §10, expo-open-ota — see
  # docs/mobile/ota.md for the pinned upstream contract). JS/asset updates only (Apple 3.3.2);
  # native changes ship through the stores and are fenced by runtimeVersion=fingerprint.
  # Updates are SIGNED AT SERVE TIME: the code-signing private key is mounted read-only here
  # and must never be committed (apps/mobile/certs/keys/ is gitignored).
  ota:
    profiles: ['full']
    image: ghcr.io/axelmarciano/expo-open-ota:latest
    environment:
      # Public origin clients reach this server at (updates.url = <BASE_URL>/manifest).
      BASE_URL: ${TRM_OTA_BASE_URL:-http://localhost:3005}
      JWT_SECRET: ${TRM_OTA_JWT_SECRET:-dev-insecure-change-me}
      # Expo API is used only for publish auth + channel→branch mapping (npx eoas publish);
      # the update serving itself is fully self-hosted.
      EXPO_APP_ID: ${EXPO_APP_ID:-}
      EXPO_ACCESS_TOKEN: ${EXPO_ACCESS_TOKEN:-}
      CACHE_MODE: local
      STORAGE_MODE: local
      LOCAL_BUCKET_BASE_PATH: /updates
      KEYS_STORAGE_TYPE: local
      PUBLIC_LOCAL_EXPO_KEY_PATH: /keys/public-key.pem
      PRIVATE_LOCAL_EXPO_KEY_PATH: /keys/private-key.pem
    volumes:
      - trm-ota-data:/updates
      - ./apps/mobile/certs/keys:/keys:ro
    ports:
      - '3005:3000'
    restart: unless-stopped

volumes:
  trm-mongo-data:
  trm-node-modules:
  trm-yarn-state:
  trm-proto-gen:
  trm-ota-data:
