syntax = "proto3";

// Server → client frames: the authoritative snapshot, cosmetic event batches,
// rejections, and chat/heartbeat. The client treats `Snapshot` as ground truth
// and `EventBatch` as animation hints (delta-replay is deferred; ADR A7/A17).
package trmission.v1;

import "trmission/v1/common.proto";

// Sent once after a valid ClientHello.
message Welcome {
  string game_id = 1;
  string player_id = 2; // "" for a spectator
  uint32 seat = 3;
  uint32 protocol_version = 4;
}

// ── Game events (mirror engine GameEvent). Redacted per-recipient by the gateway:
//    private events are only delivered to their owner, and secret-bearing fields
//    (e.g. CardDrawnBlind.card) are blanked for everyone else. ──

message GameStarted {
  repeated string turn_order = 1;
}

message InitialTicketsOffered { // private → owner only
  string player_id = 1;
  repeated string ticket_ids = 2;
}

message InitialTicketsKept {
  string player_id = 1;
  uint32 kept_count = 2;
}

message TurnStarted {
  string player_id = 1;
  uint32 order_index = 2;
}

message CardDrawnBlind { // private → owner sees `card`; opponents get UNSPECIFIED
  string player_id = 1;
  CardColor card = 2;
}

message CardTakenFaceup {
  string player_id = 1;
  uint32 slot = 2;
  CardColor card = 3;
}

message MarketRefilled {
  repeated CardColor market = 1;
}

message MarketRecycled {
  string reason = 1; // "THREE_LOCOS" | "THREE_OF_COLOR"
}

message DeckReshuffled {}

message RouteClaimed {
  string player_id = 1;
  string route_id = 2;
  uint32 points_awarded = 3;
}

message DoubleRouteLocked {
  string route_id = 1;
}

message BrokenRailRepaired {
  string player_id = 1;
  string route_id = 2;
  uint32 carriages = 3;
  uint32 points_awarded = 4;
}

message TunnelRevealed {
  string player_id = 1;
  string route_id = 2;
  repeated CardColor revealed = 3;
  uint32 extra_required = 4;
}

message TunnelResolved {
  string player_id = 1;
  string route_id = 2;
  bool committed = 3;
}

message StationBuilt {
  string player_id = 1;
  string city_id = 2;
}

message TicketsOffered { // private → owner only
  string player_id = 1;
  repeated string ticket_ids = 2;
}

message TicketsKept {
  string player_id = 1;
  uint32 kept_count = 2;
}

message PlayerPassed {
  string player_id = 1;
}

message TurnEnded {
  string player_id = 1;
}

message EndgameTriggered {
  string player_id = 1;
  uint32 final_turns_remaining = 2;
  string reason = 3; // "FINAL_TRAINS" | "DEADLOCK" (mirrors engine ENDGAME_TRIGGERED.reason)
}

message GameEnded {}

// Broadcast when a seated player's connection to a LIVE game is confirmed lost (after a debounce
// grace window, so a page reload / brief network blip is never misreported as a departure) or
// they return. Cosmetic hub/session bookkeeping — never an engine action, never part of the
// deterministic action log or stateDigest.
message PlayerConnectionChanged {
  string player_id = 1;
  bool connected = 2;
}

// A destination ticket completed mid-game (own routes connect both endpoints, or — under
// unlimitedStationBorrow — a station-borrowed edge does). PUBLIC: finished tickets are public by
// design (see CompletedTicket in common.proto); the two endpoint cities/value are not carried
// here since they're static catalog content the client already resolves by ticket_id.
message TicketCompleted {
  string player_id = 1;
  string ticket_id = 2;
}

// ── Random-events frames (mirror engine EVENT_ANNOUNCED/STARTED/ENDED/BONUS). All four are
//    PUBLIC — the events feature carries no per-recipient hidden info (unlike the ticket/hand
//    events above). ──

message RandomEventAnnounced {
  RandomEventInfo info = 1;
}

message RandomEventStarted {
  RandomEventInfo info = 1;
}

message RandomEventEnded {
  string id = 1;
  string kind = 2;
}

message RandomEventBonus {
  string kind = 1;
  string reason = 2;    // "HOTSPOT"|"REOPEN"|"STAMP"|"CHARTER"|"FREE_STATION"
  string player_id = 3;
  int32 points = 4;
  string route_id = 5;  // "" when not applicable
  string city_id = 6;   // "" when not applicable
}

message EventMarkerMoved {
  string kind = 1;
  string id = 2;
  string city_id = 3;
  string player_id = 4;
  uint32 position = 5;
}

message EventNightMarketSwapped {
  string player_id = 1;
  uint32 slot = 2;
  CardColor gave = 3;
  CardColor took = 4;
}

message EventPerkChosen {
  string player_id = 1;
  EventPerk perk = 2;
}

message EventHiveCardRevealed {
  string player_id = 1;
  CardColor card = 2;
  uint32 count = 3;
}

message EventHiveResolved {
  string player_id = 1;
  bool busted = 2;
  uint32 kept_count = 3;
}

message GameEvent {
  oneof event {
    GameStarted game_started = 1;
    InitialTicketsOffered initial_tickets_offered = 2;
    InitialTicketsKept initial_tickets_kept = 3;
    TurnStarted turn_started = 4;
    CardDrawnBlind card_drawn_blind = 5;
    CardTakenFaceup card_taken_faceup = 6;
    MarketRefilled market_refilled = 7;
    MarketRecycled market_recycled = 8;
    DeckReshuffled deck_reshuffled = 9;
    RouteClaimed route_claimed = 10;
    DoubleRouteLocked double_route_locked = 11;
    TunnelRevealed tunnel_revealed = 12;
    TunnelResolved tunnel_resolved = 13;
    StationBuilt station_built = 14;
    TicketsOffered tickets_offered = 15;
    TicketsKept tickets_kept = 16;
    PlayerPassed player_passed = 17;
    TurnEnded turn_ended = 18;
    EndgameTriggered endgame_triggered = 19;
    GameEnded game_ended = 20;
    RandomEventAnnounced random_event_announced = 21;
    RandomEventStarted random_event_started = 22;
    RandomEventEnded random_event_ended = 23;
    RandomEventBonus random_event_bonus = 24;
    TicketCompleted ticket_completed = 25;
    EventMarkerMoved event_marker_moved = 26;
    EventNightMarketSwapped event_night_market_swapped = 27;
    EventPerkChosen event_perk_chosen = 28;
    EventHiveCardRevealed event_hive_card_revealed = 29;
    EventHiveResolved event_hive_resolved = 30;
    BrokenRailRepaired broken_rail_repaired = 31;
  }
}

message Snapshot {
  GameSnapshot snapshot = 1;
}

message EventBatch {
  uint32 state_version = 1; // resulting state version after these events
  repeated GameEvent events = 2;
}

message Rejection {
  uint32 ack_client_seq = 1;
  RejectionCode code = 2;
  string message_key = 3; // i18n key (errors:*)
  string message = 4;     // developer-facing English
}

message ChatBroadcast {
  string player_id = 1;
  oneof content {
    string text = 2;
    string preset_id = 3;
  }
}

// One persisted chat line, replayed in a HistoryReplay on (re)connect.
message ChatEntry {
  string player_id = 1;
  oneof content {
    string text = 2;
    string preset_id = 4; // next free field number — ts already occupies 3
  }
  int64 ts = 3;
}

// One persisted player-connection change, replayed in a HistoryReplay on (re)connect. Never part
// of the deterministic action log (hub/session bookkeeping, not an engine action) — `after_event_index`
// anchors it to a splice position within this SAME frame's `events` (0 = before any of them) so a
// backfilled client can interleave it at roughly the right point in the log instead of always at
// the end.
message ConnectionLogEntry {
  string player_id = 1;
  bool connected = 2;
  uint32 after_event_index = 3;
}

// Sent once after the snapshot on (re)connect: the full game history, redacted
// per-recipient. The client routes this to the log/chat ONLY — never to the
// animation/sound channel — so a reconnect does not replay the whole game.
message HistoryReplay {
  repeated GameEvent events = 1; // log-only; same redaction as live events
  repeated ChatEntry chat = 2;   // empty for spectators (members-only chat)
  uint32 state_version = 3;
  repeated ConnectionLogEntry connection_log = 4;
}

// Ephemeral, non-authoritative: another member's current camera framing, relayed so
// this viewer can "follow" the acting player. Cosmetic only — not part of the
// authoritative snapshot, and carries no hidden information (just board coordinates).
message CameraMoved {
  string player_id = 1;
  CameraView view = 2;
}

// Ephemeral, non-authoritative per-turn countdown: how long the player currently being timed has
// left before the server auto-plays a default action on their behalf (issue #13). Cosmetic — never
// part of the deterministic snapshot or action log. Carries a *duration* (remaining_ms), not a
// wall-clock deadline, so the client counts down against its own clock with no server/client skew.
// player_id is "" with remaining_ms 0 to CLEAR the countdown (a bot's turn, or the game ended).
message TurnTimer {
  string player_id = 1;
  uint32 remaining_ms = 2; // ms until the server auto-plays for player_id
  uint32 total_ms = 3;     // the full per-turn budget, for rendering a full bar
}

message Pong {
  uint32 nonce = 1;
}

// Single outbound frame. `ack_client_seq` echoes the command this frame answers
// (0 when unsolicited, e.g. a broadcast).
message ServerEnvelope {
  uint32 server_seq = 1;
  uint32 ack_client_seq = 2;
  oneof event {
    Welcome welcome = 3;
    Snapshot snapshot = 4;
    EventBatch events = 5;
    Rejection rejection = 6;
    ChatBroadcast chat = 7;
    Pong pong = 8;
    CameraMoved camera_moved = 9;
    HistoryReplay history = 10;
    PlayerConnectionChanged player_connection_changed = 11;
    TurnTimer turn_timer = 12;
  }
}
