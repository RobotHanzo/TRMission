syntax = "proto3";

// Client → server commands. Every in-game command maps 1:1 onto an engine Action;
// the gateway decode→validate→apply pipeline is the sole authority (ADR A14).
package trmission.v1;

import "trmission/v1/common.proto";

// First frame on a fresh socket: presents the short-lived ws-game ticket (A8).
message ClientHello {
  string ticket = 1;
  uint32 protocol_version = 2;
  string client_info = 3; // optional UA / build string
}

// SETUP_TICKETS: keep ≥ minKeepInitial of the initial offer (engine KEEP_INITIAL_TICKETS).
message KeepInitialTickets {
  repeated string ticket_ids = 1;
}

// Draw one card blind from the deck top (engine DRAW_BLIND).
message DrawBlind {}

// Take one face-up market card by slot (engine DRAW_FACEUP).
message DrawFaceUp {
  uint32 slot = 1;
}

// Begin a draw-tickets turn → offers 3 (engine DRAW_TICKETS).
message DrawTickets {}

// Resolve a mid-game ticket offer, keeping ≥ minKeepNormal (engine KEEP_TICKETS).
message KeepTickets {
  repeated string ticket_ids = 1;
}

// Claim a route, or begin a tunnel claim → TUNNEL_PENDING (engine CLAIM_ROUTE).
message ClaimRoute {
  string route_id = 1;
  Payment payment = 2;
}

// Build a station in a city (engine BUILD_STATION).
message BuildStation {
  string city_id = 1;
  Payment payment = 2;
}

// Resolve a pending tunnel: commit (paying `extra`) or abort (engine RESOLVE_TUNNEL).
// `extra` is ignored when commit == false.
message ResolveTunnel {
  bool commit = 1;
  Payment extra = 2;
}

// Pass — only legal when the player has no other move (A15 termination).
message Pass {}

// Resolve the mandatory follow-up after scoring the roaming Lantern Host marker.
message RelocateLanternHost {
  string city_id = 1;
}

// Repair one event-closed route, paying two matching cards or an allocation permit.
message RepairRoute {
  string route_id = 1;
  Payment payment = 2;
}

// Once-per-turn free swap at the active station-front night market.
message NightMarketSwap {
  CardColor give_color = 1;
  uint32 slot = 2;
}

// Mandatory Rolling-Stock Allocation Day draft pick.
message ChooseEventPerk {
  EventPerk perk = 1;
}

// Hive of Sparks push-your-luck flow.
message StartHiveDraw {}
message ContinueHiveDraw {}
message StopHiveDraw {}

// Team game: move one card from hand into your team's public pool (engine PUSH_TO_TEAM_POOL).
// Free, once per turn. The server derives the team from the authenticated seat — the client
// never names one.
message PushToTeamPool {
  CardColor color = 1;
}

// Team game: take one card out of your team's pool (engine TAKE_FROM_TEAM_POOL). Counts as one
// of the turn's two draws.
message TakeFromTeamPool {
  CardColor color = 1;
}

// Ask the server for a fresh full snapshot (reconnect / desync recovery).
message Resync {}

message Chat {
  oneof content {
    string text = 1;
    string preset_id = 2;
  }
}

// Ephemeral, non-authoritative: the sender's current camera framing, fanned out to
// other members so they can "follow" the acting player. Never an engine action — the
// gateway handles it like Chat, bypassing the command queue, persistence, and digest.
message CameraUpdate {
  CameraView view = 1;
}

message Ping {
  uint32 nonce = 1;
}

// Single inbound frame. `client_seq` is monotonic per socket and is the durable
// idempotency key the gateway dedupes on (ADR A7).
message ClientEnvelope {
  uint32 client_seq = 1;
  oneof command {
    ClientHello hello = 2;
    KeepInitialTickets keep_initial_tickets = 3;
    DrawBlind draw_blind = 4;
    DrawFaceUp draw_faceup = 5;
    DrawTickets draw_tickets = 6;
    KeepTickets keep_tickets = 7;
    ClaimRoute claim_route = 8;
    BuildStation build_station = 9;
    ResolveTunnel resolve_tunnel = 10;
    Pass pass = 11;
    Resync resync = 12;
    Chat chat = 13;
    Ping ping = 14;
    CameraUpdate camera_update = 15;
    RelocateLanternHost relocate_lantern_host = 16;
    RepairRoute repair_route = 17;
    NightMarketSwap night_market_swap = 18;
    ChooseEventPerk choose_event_perk = 19;
    StartHiveDraw start_hive_draw = 20;
    ContinueHiveDraw continue_hive_draw = 21;
    StopHiveDraw stop_hive_draw = 22;
    PushToTeamPool push_to_team_pool = 23;
    TakeFromTeamPool take_from_team_pool = 24;
  }
}
